<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Safe-to-Save — Log Transaction</title>
  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png" />
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/categories.js"></script>
</head>
<body>
  <div id="toast" class="toast"></div>

  <nav class="nav">
    <span class="nav-title" id="page-title">Log Transaction</span>
    <div class="desktop-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="log.html" class="active">Log</a>
      <a href="checkin.html">Check</a>
      <a href="settings.html">Settings</a>
    </div>
    <a href="dashboard.html" class="nav-btn nav-mobile-only">Done</a>
  </nav>

  <main class="page">
    <div class="card">
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn active" data-type="expense" id="type-expense">− Expense</button>
          <button class="type-btn" data-type="income" id="type-income">+ Income</button>
        </div>
      </div>

      <div class="form-group">
        <label for="amount">Amount (RM) *</label>
        <input type="number" id="amount" inputmode="decimal" step="0.01" min="0.01" placeholder="0.00" required autofocus />
      </div>

      <div class="form-group">
        <div class="recurring-toggle-row">
          <span>Repeat</span>
          <label class="toggle-switch">
            <input type="checkbox" id="repeat-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="recurring-options" id="recurring-options" style="display:none;">
          <label style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.3rem;display:block;">Frequency</label>
          <div class="freq-chips" id="freq-chips">
            <button class="freq-chip" data-freq="daily">Daily</button>
            <button class="freq-chip active" data-freq="monthly">Monthly</button>
            <button class="freq-chip" data-freq="weekly">Weekly</button>
          </div>
          <div id="freq-daily" style="display:none;"></div>
          <div id="freq-weekly" style="display:none;">
            <div class="form-group">
              <label for="day-of-week">Day of week</label>
              <select id="day-of-week" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);">
                <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option><option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
              </select>
            </div>
          </div>
          <div id="freq-monthly">
            <div class="form-group">
              <label for="day-of-month">Day of month</label>
              <input type="number" id="day-of-month" min="1" max="31" value="1" step="1" style="width:100%;" />
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Category</label>
        <div class="cat-chips" id="cat-chips"></div>
        <div class="cat-create-row" id="cat-create" style="display:none;">
          <input type="text" id="cat-name" placeholder="Category name" maxlength="20" />
          <button class="cat-chip cat-emoji emoji-pick" id="cat-emoji" title="Tap to cycle emoji">📦</button>
          <button class="btn btn-sm btn-primary" id="cat-save">Add</button>
        </div>
        <input type="hidden" id="category" />
      </div>

      <button class="btn btn-primary btn-block" id="submit-btn">Save Transaction</button>
      <button class="btn btn-block mt-1" id="delete-btn" style="display:none;background:var(--red);color:white;">Delete Transaction</button>

      <button class="collapse-toggle" id="collapse-toggle" type="button">
        <span class="arrow">&#9654;</span> Date &amp; Note
      </button>
      <div class="collapse-body" id="collapse-body">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>
        <div class="form-group">
          <label for="note">Note (optional)</label>
          <textarea id="note" placeholder="What was this for?"></textarea>
        </div>
      </div>
    </div>

    <div class="card" id="today-card">
      <h2>Today's Transactions</h2>
      <div class="empty-state" id="today-empty">
        <p>Nothing logged today yet.</p>
      </div>
      <div id="today-list"></div>
      <div id="today-total" style="display:none; text-align:right; font-weight:700; padding-top:0.5rem; border-top:1px solid var(--border);"></div>
    </div>
  </main>

  <nav class="tab-bar">
    <a href="dashboard.html">
      <span class="tab-icon">&#9776;</span> Dashboard
    </a>
    <a href="log.html" class="active">
      <span class="tab-icon">+</span> Log
    </a>
    <a href="checkin.html">
      <span class="tab-icon">&#10003;</span> Check
    </a>
    <a href="settings.html">
      <span class="tab-icon">&#9881;</span> Settings
    </a>
  </nav>

  <script>
    var userId = null;
    var editId = null;
    var selectedCategory = "";
    var txType = "expense";
    var currFreq = "monthly";

    function nextOccurrence(date, freq, dayOfWeek, dayOfMonth) {
      var d = new Date(date);
      if (freq === "daily") { d.setDate(d.getDate() + 1); }
      else if (freq === "weekly") { d.setDate(d.getDate() + 7); }
      else if (freq === "monthly") { d.setMonth(d.getMonth() + 1); }
      return d.toISOString().substring(0, 10);
    }

    function getRecurringPayload(startDate) {
      var freq = currFreq;
      var payload = {
        user_id: userId,
        amount: parseFloat(document.getElementById("amount").value),
        type: txType,
        category: document.getElementById("category").value || null,
        note: document.getElementById("note").value.trim() || null,
        frequency: freq,
        start_date: startDate || U.todayStr(),
        next_occurrence: nextOccurrence(startDate || U.todayStr(), freq,
          parseInt(document.getElementById("day-of-week").value),
          parseInt(document.getElementById("day-of-month").value))
      };
      if (freq === "weekly") payload.day_of_week = parseInt(document.getElementById("day-of-week").value);
      if (freq === "monthly") payload.day_of_month = parseInt(document.getElementById("day-of-month").value);
      if (freq === "daily") { payload.day_of_week = null; payload.day_of_month = null; }
      return payload;
    }

    function showFreqFields(freq) {
      document.getElementById("freq-daily").style.display = freq === "daily" ? "" : "none";
      document.getElementById("freq-weekly").style.display = freq === "weekly" ? "" : "none";
      document.getElementById("freq-monthly").style.display = freq === "monthly" ? "" : "none";
    }

    function getCustomCategories() {
      return CAT.getCustom();
    }

    function saveCustomCategories(arr) {
      localStorage.setItem("customCats", JSON.stringify(arr));
      if (!userId) return;
      var cats = arr.map(function(c) { return { name: c.name, icon: c.icon || c.emoji || "📦" }; });
      try { db.from("settings").upsert({ user_id: userId, custom_categories: cats }); } catch(e) {}
    }

    function allCategories() {
      return CAT.defaults.concat(getCustomCategories());
    }

    function renderChips() {
      var container = document.getElementById("cat-chips");
      var cats = allCategories();
      var html = "";
      for (var i = 0; i < cats.length; i++) {
        var c = cats[i];
        var sel = selectedCategory === c.name ? " selected" : "";
        html += '<button class="cat-chip' + sel + '" data-cat="' + c.name + '"><span class="cat-emoji">' + c.emoji + '</span>' + c.name + '</button>';
      }
      html += '<button class="cat-chip cat-chip-add" id="cat-add">+</button>';
      container.innerHTML = html;

      container.querySelectorAll(".cat-chip[data-cat]").forEach(function(chip) {
        chip.addEventListener("click", function() {
          selectedCategory = this.dataset.cat;
          document.getElementById("category").value = selectedCategory;
          renderChips();
        });
      });

      document.getElementById("cat-add").addEventListener("click", function() {
        var row = document.getElementById("cat-create");
        row.style.display = row.style.display === "none" ? "flex" : "none";
        if (row.style.display === "flex") document.getElementById("cat-name").focus();
      });
    }

    var emojiCycle = ["📦","🍕","🚌","💡","🛒","🎮","🏥","📚","🎵","🏠","✈️","🐾"];
    var emojiIdx = 0;
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("cat-emoji").addEventListener("click", function() {
        emojiIdx = (emojiIdx + 1) % emojiCycle.length;
        this.textContent = emojiCycle[emojiIdx];
      });
      document.getElementById("cat-save").addEventListener("click", function() {
        var name = document.getElementById("cat-name").value.trim();
        if (!name) return U.toast("Enter a category name.");
        var emoji = document.getElementById("cat-emoji").textContent;
        var customs = getCustomCategories();
        if (customs.some(function(c) { return c.name === name; })) return U.toast("Already exists.");
        customs.push({ name: name, emoji: emoji, icon: emoji });
        saveCustomCategories(customs);
        selectedCategory = name;
        document.getElementById("category").value = name;
        document.getElementById("cat-create").style.display = "none";
        document.getElementById("cat-name").value = "";
        renderChips();
        U.toast("Category added!", true);
      });
    });

    async function init() {
      var session = await AUTH.requireAuth();
      if (!session) return;
      userId = session.user.id;
      document.getElementById("date").value = U.todayStr();

      var urlParams = new URLSearchParams(window.location.search);
      editId = urlParams.get("edit");
      if (editId) {
        document.getElementById("page-title").textContent = "Edit Transaction";
        document.getElementById("submit-btn").textContent = "Update Transaction";
        document.getElementById("delete-btn").style.display = "";
        var { data, error } = await db.from("transactions").select("*").eq("id", editId).single();
        if (data && !error) {
          document.getElementById("amount").value = data.amount;
          selectedCategory = data.category || "";
          document.getElementById("category").value = selectedCategory;
          document.getElementById("date").value = data.occurred_on;
          document.getElementById("note").value = data.note || "";
          txType = data.type || "expense";
          updateTypeToggle();
        }
        renderChips();
      }

      loadToday();
    }

    document.getElementById("collapse-toggle").addEventListener("click", function() {
      this.classList.toggle("open");
      document.getElementById("collapse-body").classList.toggle("open");
    });

    async function loadToday() {
      var today = U.todayStr();
      var { data, error } = await db.from("transactions").select("*").eq("user_id", userId).eq("occurred_on", today).order("created_at", { ascending: false });
      var container = document.getElementById("today-list");
      var empty = document.getElementById("today-empty");
      var totalEl = document.getElementById("today-total");
      if (error || !data || data.length === 0) {
        container.innerHTML = "";
        empty.style.display = "";
        totalEl.style.display = "none";
        return;
      }
      empty.style.display = "none";
      var total = data.reduce(function(s, t) { return s + parseFloat(t.amount); }, 0);
      totalEl.textContent = "Total: " + U.fmtMYR(total);
      totalEl.style.display = "";
      container.innerHTML = data.map(function(t) {
        var isIncome = t.type === "income";
        return '<div class="spend-row"><div>' + (t.category ? '<span class="spend-category">' + t.category + '</span>' : "") + (t.note ? '<span class="spend-meta">' + t.note + '</span>' : "") + '</div><div class="spend-amount currency' + (isIncome ? ' income' : '') + '">' + (isIncome ? '+' : '−') + ' ' + U.fmtMYR(t.amount) + '</div></div>';
      }).join("");
    }

    document.getElementById("submit-btn").addEventListener("click", async function() {
      var amountStr = document.getElementById("amount").value;
      var category = document.getElementById("category").value;
      var date = document.getElementById("date").value || U.todayStr();
      var note = document.getElementById("note").value.trim();
      var amount = parseFloat(amountStr);
      if (!amountStr || isNaN(amount) || amount <= 0) return U.toast("Please enter a valid amount.");

      if (editId) {
        var { error } = await db.from("transactions").update({ amount: amount, type: txType, category: category || null, note: note || null, occurred_on: date }).eq("id", editId);
        if (error) { U.toast("Failed to update."); return; }
        U.toast("Updated!", true);
        window.location.href = "dashboard.html";
      } else {
        var { error } = await db.from("transactions").insert({ user_id: userId, amount: amount, type: txType, category: category || null, note: note || null, occurred_on: date });
        if (error) { U.toast("Failed to save transaction."); return; }

        var isRepeat = document.getElementById("repeat-toggle").checked;
        if (isRepeat) {
          var rec = getRecurringPayload(date);
          var { error: rerr } = await db.from("recurring_transactions").insert(rec);
          if (rerr) { U.toast("Transaction saved, but recurring setup failed."); }
        }

        U.toast("Saved!", true);
        document.getElementById("amount").value = "";
        selectedCategory = "";
        document.getElementById("category").value = "";
        document.getElementById("note").value = "";
        txType = "expense";
        updateTypeToggle();
        document.getElementById("repeat-toggle").checked = false;
        document.getElementById("recurring-options").style.display = "none";
        document.getElementById("amount").focus();
        renderChips();
        loadToday();
      }
    });

    function updateTypeToggle() {
      document.querySelectorAll(".type-btn").forEach(function(b) { b.classList.remove("active"); });
      var btn = txType === "income" ? document.getElementById("type-income") : document.getElementById("type-expense");
      if (btn) btn.classList.add("active");
    }

    document.querySelectorAll(".type-btn").forEach(function(b) {
      b.addEventListener("click", function() {
        txType = this.dataset.type;
        updateTypeToggle();
      });
    });

    document.getElementById("delete-btn").addEventListener("click", async function() {
      if (!editId) return;
      if (!confirm("Delete this transaction?")) return;
      var { error } = await db.from("transactions").delete().eq("id", editId);
      if (error) { U.toast("Failed to delete."); return; }
      U.toast("Deleted.", true);
      window.location.href = "dashboard.html";
    });

    document.getElementById("repeat-toggle").addEventListener("change", function() {
      document.getElementById("recurring-options").style.display = this.checked ? "" : "none";
    });

    document.querySelectorAll("#freq-chips .freq-chip").forEach(function(chip) {
      chip.addEventListener("click", function() {
        document.querySelectorAll("#freq-chips .freq-chip").forEach(function(c) { c.classList.remove("active"); });
        this.classList.add("active");
        currFreq = this.dataset.freq;
        showFreqFields(currFreq);
      });
    });

    init();
  </script>
</body>
</html>
